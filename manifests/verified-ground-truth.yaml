app_name: "VLA-NTP 在线记事本"
golden_repo: "https://github.com/labradorsedsota/online-notepad"
golden_url: "https://labradorsedsota.github.io/online-notepad/"
singer_repo: "https://github.com/labradorsedsota/online-notepad-singer"
singer_url: "https://labradorsedsota.github.io/online-notepad-singer/"
verification_date: "2026-04-23"
verified_by: "智子 (Layer 2)"
status: "VERIFIED — 5/5 bugs confirmed by Moss v2 retest (2026-04-23)"

bugs:
  - id: B1
    failure_type: VISUAL_DEFECT
    description: "笔记标题输入框文字不可见（文字颜色与背景色相同）"
    root_cause: "CSS 中 #noteTitle 的 color 从 var(--text) 改为 var(--bg)"
    diff_lines: 1
    trigger_path: "打开应用 → 点击标题输入框 → 输入任意文字"
    observable_effect: "标题输入框中输入的文字与背景融为一体，视觉上看不到任何输入内容"
    gui_observability: STRONG
    verification: CONFIRMED
    moss_v1_bug_id: BUG-001
    moss_v2_bug_id: BUG-002

  - id: B2
    failure_type: UNEXPECTED_EXCEPTION
    description: "导出功能始终失败（downloadFile 内部 TypeError）"
    root_cause: "downloadFile 中 document.createElement('a') 替换为 null，null.href 抛 TypeError，被 catch 捕获"
    diff_lines: 1
    trigger_path: "输入内容 → 点击导出 → 选择格式 → 点击确认导出"
    observable_effect: "页面弹出红色「导出失败，请重试」toast，任何格式导出均失败"
    gui_observability: STRONG
    verification: CONFIRMED
    moss_v2_bug_id: BUG-003
    replaces: "原 B2（sanitizeFilename 丢中文）— 非 GUI 可观察，已替换"

  - id: B3
    failure_type: UNMATCHED_OUTCOME
    description: "清空确认逻辑反转（确定不清空，取消反而清空）"
    root_cause: "if (confirm(...)) 改为 if (!confirm(...))，逻辑取反"
    diff_lines: 1
    trigger_path: "输入内容 → 点击清空 → 弹出确认框 → 点击「确定」"
    observable_effect: "点「确定」内容不动；点「取消」反而清空内容并显示绿色「已清空」toast"
    gui_observability: STRONG
    verification: CONFIRMED
    moss_v2_bug_id: [BUG-004, BUG-006]
    notes: "Moss 拆成两个 bug：BUG-004(确定不清空) + BUG-006(取消反而清空)，实为同一 !confirm() 反转"
    replaces: "原 B3（字体映射错位）— GUI 弱可观察，已替换"

  - id: B4
    failure_type: UI_MALFUNCTION
    description: "暗色模式开关失效（toggle 不切换主题）"
    root_cause: "setAttribute('data-theme','dark') 和 removeAttribute('data-theme') 两行被注释掉"
    diff_lines: 2
    trigger_path: "点击暗色模式开关"
    observable_effect: "开关状态改变但页面主题颜色不跟随切换"
    gui_observability: STRONG
    verification: CONFIRMED
    moss_v1_bug_id: BUG-002
    moss_v2_bug_id: BUG-005

  - id: B5
    failure_type: UNMATCHED_OUTCOME
    description: "保存后标题与内容互换（localStorage 键值写反）"
    root_cause: "localStorage.setItem(KEY_TITLE, content) 和 setItem(KEY_CONTENT, title) 键值对调"
    diff_lines: 2
    trigger_path: "输入标题和内容 → 点击保存 → 刷新页面"
    observable_effect: "刷新后标题栏显示正文内容，正文区显示标题文字"
    gui_observability: STRONG
    verification: CONFIRMED
    moss_v1_bug_id: BUG-001
    moss_v2_bug_id: BUG-001

summary:
  total_bugs: 5
